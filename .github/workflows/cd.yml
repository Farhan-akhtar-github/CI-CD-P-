name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  cd:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            docker stop ci-cd-clean-app || true
            docker rm ci-cd-clean-app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.event.workflow_run.head_sha }}
            docker run -d \
              --name ci-cd-clean-app \
              --restart unless-stopped \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.event.workflow_run.head_sha }}
