name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  cd:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Zero-downtime deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin:/usr/bin
            IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app
            TAG=${{ github.event.workflow_run.head_sha }}

            # 1. Pull new image while old container is still serving traffic
            docker pull ${IMAGE}:${TAG}

            # 2. Start new container on a temporary port for health verification
            docker run -d \
              --name ci-cd-clean-app-new \
              -p 5001:5000 \
              ${IMAGE}:${TAG}

            # 3. Wait for new container to pass health check
            echo "Waiting for new container health check..."
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5001/health | grep -q '"UP"'; then
                echo "New container is healthy (attempt ${i})"
                HEALTHY=true
                break
              fi
              echo "Health check attempt ${i}/30 - waiting..."
              sleep 2
            done

            # 4. If unhealthy, rollback: remove new container and keep old running
            if [ "$HEALTHY" != "true" ]; then
              echo "ERROR: New container failed health check — rolling back"
              docker stop ci-cd-clean-app-new || true
              docker rm ci-cd-clean-app-new || true
              exit 1
            fi

            # 5. Swap: stop old, re-launch on production port
            #    (Docker does not support changing port bindings on existing
            #    containers, so a new container is required on port 5000.
            #    The final health check in step 6 verifies it starts correctly.)
            docker stop ci-cd-clean-app || true
            docker rm ci-cd-clean-app || true
            docker stop ci-cd-clean-app-new
            docker rm ci-cd-clean-app-new

            docker run -d \
              --name ci-cd-clean-app \
              --restart unless-stopped \
              -p 5000:5000 \
              ${IMAGE}:${TAG}

            # 6. Verify production container is healthy
            echo "Verifying production container..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:5000/health | grep -q '"UP"'; then
                echo "Deployment successful — production container is healthy"
                exit 0
              fi
              sleep 2
            done

            echo "ERROR: Production container failed health check"
            exit 1
