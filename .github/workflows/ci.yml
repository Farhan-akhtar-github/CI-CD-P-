name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint, Test, Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 app.py tests/

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with layer caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:latest
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get current week for Trivy cache rotation
        id: week
        run: echo "week=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/.trivy-cache
          key: trivy-db-${{ steps.week.outputs.week }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          cache-dir: /tmp/.trivy-cache

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}

