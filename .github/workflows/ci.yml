name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI - Lint, Test, Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 app.py tests/

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and tag Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app
          docker build -t ${IMAGE}:latest -t ${IMAGE}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}

  cd:
    name: CD - Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop ci-cd-clean-app || true
            docker rm ci-cd-clean-app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}
            docker run -d \
              --name ci-cd-clean-app \
              --restart unless-stopped \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}

