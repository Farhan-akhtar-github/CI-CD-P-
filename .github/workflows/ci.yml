name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 app.py tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v

  build:
    name: Build Docker Image
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with layer caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:latest
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as artifact
        run: |
          docker save \
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:latest \
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }} \
            -o /tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  scan:
    name: Trivy Vulnerability Scan
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Get current week for Trivy cache rotation
        id: week
        run: echo "week=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: /tmp/.trivy-cache
          key: trivy-db-${{ steps.week.outputs.week }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          cache-dir: /tmp/.trivy-cache

  smoke-test:
    name: Smoke Test
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Container health check smoke test
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app:${{ github.sha }}
          docker run -d --name smoke-test -p 5000:5000 ${IMAGE}
          echo "Waiting for container to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/health | grep -q '"UP"'; then
              echo "Health check passed"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Health check failed"
              docker logs smoke-test
              docker stop smoke-test && docker rm smoke-test
              exit 1
            fi
            sleep 2
          done
          docker stop smoke-test && docker rm smoke-test

  push:
    name: Push Docker Image
    needs: [scan, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/ci-cd-clean-app
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}

